name: ForgeRock Pull Request CI
on:
  pull_request:
env:
  NX_CLOUD_ENCRYPTION_KEY: ${{ secrets.NX_CLOUD_ENCRYPTION_KEY }}
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  NX_CLOUD_DISTRIBUTED_EXECUTION: true
jobs:
  pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
      - run: npx nx-cloud start-ci-run --distribute-on="5 linux-medium-js" --stop-agents-after="e2e"

      - name: Setup custom host for sdkapp.example.com
        run: |
          sudo echo "127.0.0.1 localhost sdkapp.example.com auth.example.com api.example.com user.example.com" | sudo tee -a /etc/hosts
          sudo echo "::1 ip6-localhost ip6-loopback" | sudo tee -a /etc/hosts

      - name: npm install
        run: npm ci
        env:
          DEBUG: pw:install

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v3
        with:
          main-branch-name: 'develop'
      # This line is needed for nx affected to work when CI is running on a PR
      - run: git branch --track main origin/develop

      - run: npx nx-cloud record -- nx format:check
      - run: npx nx affected -t lint test build e2e

      - name: Artifacts
        uses: actions/upload-artifact@v4
        with:
          retention-days: 5
          if-no-files-found: ignore
          path: |
            e2e/autoscript-suites/test-results/*
            coverage/*
